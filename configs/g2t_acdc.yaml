seed: 42
run_dir: runs/g2t_acdc

data:
  train_csv: data/acdc_train.csv
  image_size: [224, 224]
  in_channels: 1

model:
  in_channels: 1
  num_classes: 4
  channels: [32, 64, 128, 256]
  attention_heads: 4
  freeze_encoder: false

training:
  epochs: 200
  batch_size: 8
  lr: 0.0001
  weight_decay: 0.0001
  num_workers: 2
  dice_weight: 0.3
